<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity-Z</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="el-pataf">
        <img src="img/background.png" alt="background-IMG">
        
        <div class="ch-comptoir">
            <div class="header-panel">
                <img class="settings" src="img/settings.png" alt="settings icon">
                <p class="settings">Paramétrer</p>
            </div>
            <div class="patte gauche"></div>

            

            <hr class="divider">

            <p class="poids">POID : 55 KG</p>
            <input type="range" class="slider" min="1" max="100" value="55">

            <div class="rayon-row">
                <p class="rayon">RAYON : 50 CM</p>
                <img class="rayon-lock" src="img/lock.png" alt="cadenas icon">
            </div>

            <p class="preset">PRESET</p>
            <hr class="divider">
            <div class="preset-grid">
            <p class="elements eau">EAU</p>
            <p class="elements lave">LAVE</p>
            <p class="elements plond">PLOND</p>
            <p class="elements plume">PLUME</p>
            </div>

            <p class="retour">RETOUR SUR LA CHUTE</p>
            <hr class="divider">
            <p class="infos">DURÉE TOTALE: <span>55 s</span></p>
            <p class="infos">VITESSE MAX: <span>5 m/s</span></p>
            <p class="infos">FORCE DE CONTACT: <span>5 j</span></p>

            <div class="patte droite"></div>
        </div>

        <div class="golf">
            <img src="img/golf.png">

        </div>

        <div class="ground">
            <img src="img/ground.png">
        </div>

        <div class="panneau">
            <img src="img/panneau.png">
        </div>

    </div>
    <script src=""></script>
</body>
</html>
